    text: "Wir entwirren Monolithen und fragile Integrationen über inkrementelle Migrationspfade: Strangler Patterns, contract-first APIs, Test Harnesses und disziplinierte Cutovers."

  - pretitle: "Product Engineering"
    pretext: "Mobile und Cloud"
    color: "#1FA463"
    icon: "smartphone"
